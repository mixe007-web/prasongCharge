<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <base href="/prasongCharge/">

  <title>AC-EV-Charging-Time</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />

  <!-- Icons -->
  <link rel="icon" href="./icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="./icon-512.png" />

  <meta name="theme-color" content="#0d6efd" />
  <meta name="description" content="AC-EV-Charging-Time Progressive Web App" />
</head>

<body>

<div id="loading" style="text-align:center; margin-top:40vh;">
  <h3>⚡ กำลังโหลด AC-EV-Charging-Time...</h3>
</div>

<script>

const APP_URL = './AC-EV-Charging-Time.html';

// ✅ ถ้า browser รองรับ SW
if (
  'serviceWorker' in navigator &&
  location.protocol !== 'file:'
) {

  window.addEventListener('load', async () => {

    try {

      // register SW
      const registration = await navigator.serviceWorker.register('./service-worker.js');

      console.log('[PWA] Service Worker registered');

      // ✅ เช็ก update ใหม่ทันที
      registration.update();

    } catch (err) {

      console.warn('[PWA] SW failed:', err);

    }

    // ✅ redirect ทันที
    window.location.replace(APP_URL);

  });

} else {

  // browser ไม่รองรับ
  window.location.replace(APP_URL);

}

</script>

</body>
</html>
