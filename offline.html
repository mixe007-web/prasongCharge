<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline</title>
  <style>
    body {
      display: flex;
      height: 100vh;
      margin: 0;
      font-family: 'Rubik', sans-serif;
      background-color: #f8f9fa;
      color: #333;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 1rem;
    }
    h1 {
      font-size: 2.5rem;
      color: #007bff;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      color: #555;
    }
    i {
      font-size: 5rem;
      color: #6c757d;
      margin-bottom: 1rem;
    }
    button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <i class="fas fa-wifi-slash"></i>
  <h1>คุณออฟไลน์อยู่</h1>
  <p>ไม่สามารถโหลดข้อมูลได้ในขณะนี้ กรุณาเชื่อมต่ออินเทอร์เน็ตใหม่อีกครั้ง</p>
  <button onclick="location.reload()">🔄 โหลดหน้าใหม่</button>

  <!-- FontAwesome icon CDN -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
