<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline</title>
  <style>
    body {
      display: flex;
      height: 100vh;
      margin: 0;
      font-family: 'Rubik', sans-serif;
      background-color: #f8f9fa;
      color: #333;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 1rem;
    }
    h1 {
      font-size: 3rem;
      color: #28a745;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 1.25rem;
      margin-bottom: 2rem;
    }
    i {
      font-size: 5rem;
      color: #6c757d;
      margin-bottom: 1rem;
    }
    button {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>
  <i class="fas fa-wifi-slash"></i>
  <h1>You are offline</h1>
  <p>Sorry, the page is not available while you are offline.</p>
  <button onclick="location.reload()">Try Again</button>

  <!-- FontAwesome CDN for the wifi-slash icon -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
